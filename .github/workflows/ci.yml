name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    # Non-blocking for now: src/App.jsx carries a known pre-existing lint baseline
    # (~54 errors) that the Phase 4 decomposition will clear. This surfaces NEW
    # issues in PR logs without failing CI; flip continue-on-error off once the
    # baseline is zero.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: chronotrack
        ports: ['5544:5432']
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:test@localhost:5544/chronotrack
      PGSSL: disable
      JWT_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build SPA
        run: npm run build
      - name: Backend + RBAC + analytics tests
        run: npm run test:api
