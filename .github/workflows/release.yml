name: Release (build installers)

# Builds the desktop agent installers and attaches them to a GitHub Release.
# Trigger: push a tag like v3.0.0, or run manually (Actions -> Release -> Run).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  # Production cloud API the installed agent talks to. Set as a repo variable:
  # Settings -> Secrets and variables -> Actions -> Variables -> VITE_API_BASE
  VITE_API_BASE: ${{ vars.VITE_API_BASE }}

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: npm ci
      - name: Bundle telemetry daemon (PyInstaller)
        run: |
          python -m pip install --upgrade pip pyinstaller cryptography keyring pywin32 certifi
          pyinstaller --onefile --noconsole --name CivilMantraDaemon --distpath dist-daemon `
            --hidden-import keyring.backends.Windows `
            --hidden-import cryptography.fernet `
            --collect-data certifi `
            src-daemon/telemetry_daemon.py
      - name: Build SPA
        run: npm run build
      - name: Build Windows installer (NSIS, signed if cert secrets present)
        shell: pwsh
        run: |
          # electron-builder treats a merely-*set* CSC_LINK (even "") as "please
          # sign" and fails resolving it to a file. GitHub Actions' `env:` block
          # always creates the var (as "") when a referenced secret doesn't
          # exist, so we only export it here, conditionally, when it's real.
          # Add repo secrets WIN_CSC_LINK (base64 -w0 cert.pfx) / WIN_CSC_KEY_PASSWORD
          # to enable Authenticode signing (removes the SmartScreen "Unknown
          # publisher" warning).
          if ("${{ secrets.WIN_CSC_LINK }}" -ne "") {
            $env:CSC_LINK = "${{ secrets.WIN_CSC_LINK }}"
            $env:CSC_KEY_PASSWORD = "${{ secrets.WIN_CSC_KEY_PASSWORD }}"
          }
          npx electron-builder --win nsis --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-desktop/*.exe
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-desktop/*.exe

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: npm ci
      - name: Bundle telemetry daemon (PyInstaller)
        run: |
          python -m pip install --upgrade pip pyinstaller cryptography keyring certifi
          PYINSTALLER="$(python -c 'import sys,os;print(os.path.join(os.path.dirname(sys.executable),"pyinstaller"))')" \
            bash src-daemon/build_daemon.sh
      - name: Build SPA
        run: npm run build
      - name: Build Linux installers
        run: npx electron-builder --linux AppImage deb --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            dist-desktop/*.AppImage
            dist-desktop/*.deb
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-desktop/*.AppImage
            dist-desktop/*.deb
